# Supabase project configuration
# Run `supabase link --project-ref <ref>` after creating the project on the dashboard
# to link this config to the remote project.
#
# IMPORTANT: The admin-focus-website project MUST be created in the Supabase dashboard
# using region "Africa (Cape Town)" for FAIS data residency compliance.
# The Supabase CLI does not support af-south-1 as a --region flag.
# Dashboard: https://supabase.com/dashboard/new/szfufmykeiyujzhkalra

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://adminfocus.co.za"]

[realtime]
enabled = true
